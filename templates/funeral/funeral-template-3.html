<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>In Loving Memory - Randy Adams</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Montserrat:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #000000;
        --text: #ffffff;
        --accent: #d4af37;
        --serif: "Cinzel", serif;
        --sans: "Montserrat", sans-serif;
      }

      /* Essential for Snapping */
      html {
        scroll-snap-type: y proximity;
        scroll-behavior: smooth;
      }

      body,
      html {
        margin: 0;
        padding: 0;
        background-color: var(--bg);
        color: var(--text);
        font-family: var(--sans);
        overflow-x: hidden;
      }

      section {
        height: 100vh;
        scroll-snap-align: start;
        position: relative;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      /* --- GLOBAL REVEAL ANIMATION --- */
      .reveal-up {
        opacity: 0;
        transform: translateY(30px);
        transition: all 1.2s cubic-bezier(0.25, 1, 0.5, 1);
      }

      .reveal-up.active {
        opacity: 1;
        transform: translateY(0);
      }

      .delay-1 {
        transition-delay: 0.2s;
      }
      .delay-2 {
        transition-delay: 0.4s;
      }

      /* --- Hero Section --- */
      .hero-section {
        text-align: center;
        padding: 20px;
      }

      .main-portrait-container {
        /* Responsive sizing for the circle */
        width: min(450px, 70vw);
        height: min(450px, 70vw);
        border-radius: 50%;
        border: 2px solid white;
        overflow: hidden;
        margin: 30px auto;
      }

      .main-portrait {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .sub-title {
        font-size: clamp(1rem, 4vw, 1.5rem);
        text-transform: uppercase;
        letter-spacing: 6px;
        margin-bottom: 20px;
      }
      .name-title {
        font-family: var(--serif);
        font-size: clamp(2.5rem, 10vw, 6rem);
        margin: 0;
      }

      /* --- SECTION 2: SNAPPING SLIDES --- */
      .story-container {
        position: relative;
      }

      .slide {
        height: 100vh;
        width: 100%;
        scroll-snap-align: start;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #000;
        padding: 20px;
        box-sizing: border-box;
      }

      .content-frame {
        display: flex;
        width: 90%;
        max-width: 1200px;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .image-viewer,
      .text-viewer {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .story-img {
        /* Responsive width/height */
        width: 100%;
        max-width: 400px;
        height: auto;
        aspect-ratio: 4/5;
        object-fit: cover;
        box-shadow: 0 30px 60px rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transform: translateX(-50px); /* Reduced for mobile safety */
        opacity: 0;
        transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
      }

      .story-text {
        transform: translateX(50px);
        opacity: 0;
        transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
      }

      .slide.active .story-img,
      .slide.active .story-text {
        transform: translate(0, 0);
        opacity: 1;
      }

      .story-text h2 {
        font-family: var(--serif);
        font-size: clamp(2rem, 6vw, 4.5rem);
        border-left: 5px solid var(--accent);
        padding-left: 30px;
        margin: 0;
      }

      /* --- Details Section --- */
      .details-section {
        text-align: center;
        padding: 20px;
      }

      .candle {
        position: absolute;
        width: clamp(150px, 25vw, 350px);
        pointer-events: none; /* Prevents overlap issues */
      }
      .candle-top-right {
        top: 40px;
        right: 40px;
      }
      .candle-bottom-left {
        bottom: 40px;
        left: 40px;
      }

      .info-row h2 {
        font-size: clamp(2rem, 8vw, 4.5rem);
        font-family: var(--serif);
        color: var(--accent);
        margin-bottom: 20px;
      }
      .info-row p {
        font-size: clamp(1rem, 4vw, 1.5rem);
        margin: 10px 0;
      }

      .rsvp-btn {
        position: absolute;
        bottom: 30px;
        right: 30px;
        width: clamp(100px, 20vw, 150px);
        height: clamp(100px, 20vw, 150px);
        background: #fff;
        border-radius: 50%;
        border: none;
        font-weight: bold;
        cursor: pointer;
        transition: transform 0.3s ease;
        z-index: 10;
      }
      .rsvp-btn:hover {
        transform: scale(1.1);
      }

      /* --- MOBILE OVERRIDES (The magic part) --- */
      @media (max-width: 900px) {
        .content-frame {
          flex-direction: column; /* Stack image on top of text */
          text-align: center;
          justify-content: center;
        }
        .story-img {
          width: 250px;
          transform: translateY(-30px); /* Slide down instead of left */
        }
        .story-text {
          transform: translateY(30px); /* Slide up instead of right */
        }
        .story-text h2 {
          border-left: none;
          border-top: 5px solid var(--accent);
          padding-left: 0;
          padding-top: 20px;
          margin-top: 20px;
        }
        .candle {
          opacity: 0.3; /* Dim candles so text is readable */
          width: 150px;
        }
        .rsvp-btn {
          width: 80px;
          height: 80px;
          font-size: 12px;
          bottom: 20px;
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <section class="hero-section">
      <div class="reveal-up">
        <p class="sub-title">In Loving Memory</p>
        <div class="main-portrait-container reveal-up delay-1">
          <img
            src="/assets/images/funeral/hero-portrait.jpg"
            class="main-portrait"
            alt="Randy Adams"
            data-editable
            data-key="main_portrait"
          />
        </div>
        <h1
          class="name-title reveal-up delay-2"
          data-editable
          data-key="name_title"
        >
          Randy Adams
        </h1>
      </div>
    </section>

    <div class="story-container">
      <div class="slide">
        <div class="content-frame">
          <div class="image-viewer">
            <img
              src="/assets/images/funeral/hero-portrait.jpg"
              class="story-img"
              data-editable
              data-key="story_img_1"
            />
          </div>
          <div class="text-viewer">
            <div class="story-text">
              <h2 data-editable data-key="story_title_1">A Father</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="slide">
        <div class="content-frame">
          <div class="image-viewer">
            <img
              src="/assets/images/funeral/hero-portrait-2.jpg"
              class="story-img"
              data-editable
              data-key="story_img_2"
            />
          </div>
          <div class="text-viewer">
            <div class="story-text">
              <h2 data-editable data-key="story_title_2">Our Teacher</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="slide">
        <div class="content-frame">
          <div class="image-viewer">
            <img
              src="/assets/images/funeral/portrait-gp.jpg"
              class="story-img"
              data-editable
              data-key="story_img_3"
            />
          </div>
          <div class="text-viewer">
            <div class="story-text">
              <h2 data-editable data-key="story_title_3">An Honest Man</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="slide">
        <div class="content-frame">
          <div class="image-viewer">
            <img
              src="/assets/images/funeral/portrait-gp.jpg"
              class="story-img"
              data-editable
              data-key="story_img_4"
            />
          </div>
          <div class="text-viewer">
            <div class="story-text">
              <h2 data-editable data-key="story_title_4">A Guiding Light</h2>
            </div>
          </div>
        </div>
      </div>
    </div>

    <section class="details-section">
      <img
        src="/assets/images/funeral/candle-small.jpg"
        class="candle candle-top-right reveal-up"
        data-editable
        data-key="candle_top"
      />
      <img
        src="/assets/images/funeral/candle-small.jpg"
        class="candle candle-bottom-left reveal-up"
        data-editable
        data-key="candle_bottom"
      />

      <div class="info-row reveal-up delay-1">
        <h2 data-editable data-key="service_date">25th April 2026</h2>
        <p data-editable data-key="service_location">
          ST Michaels Church, Sharjah
        </p>
        <p data-editable data-key="service_time">8:30 — 11:30 AM</p>
      </div>

      <button class="rsvp-btn reveal-up delay-2">RSVP</button>
    </section>

    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("active");
            } else {
              if (entry.target.classList.contains("slide")) {
                entry.target.classList.remove("active");
              }
            }
          });
        },
        { threshold: 0.5 },
      );

      document.querySelectorAll(".slide").forEach((el) => observer.observe(el));
      document
        .querySelectorAll(".reveal-up")
        .forEach((el) => observer.observe(el));
    </script>
    <script src="/assets/js/editor.js"></script>
  </body>
</html>
